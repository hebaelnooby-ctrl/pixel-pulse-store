<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Shop - Neon Creative</title>
<style>
/* =================== Global =================== */
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  overflow-x: hidden;
  transition: background 0.5s, color 0.5s;
}

/* Background Catchy Neon */
body.light-mode {
  color: #000;
  background: linear-gradient(120deg, #ff0080, #00ffff, #ffeb3b, #ff00ff, #00ff99);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

body.dark-mode {
  color: #fff;
  background: #000;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1, h2, h3, h4 {
  margin: 0;
}

button {
  cursor: pointer;
  outline: none;
}

/* =================== Neon Animations =================== */
@keyframes neonGlow {
  0% { text-shadow: 0 0 10px #39FF14, 0 0 20px #00FFFF, 0 0 25px #FF1493; }
  50% { text-shadow: 0 0 20px #39FF14, 0 0 40px #00FFFF, 0 0 50px #FF1493; }
  100% { text-shadow: 0 0 10px #39FF14, 0 0 20px #00FFFF, 0 0 25px #FF1493; }
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 10px #39FF14, 0 0 20px #FF1493; }
  50% { transform: scale(1.05); box-shadow: 0 0 20px #00FFFF, 0 0 35px #FF00FF; }
  100% { transform: scale(1); box-shadow: 0 0 10px #39FF14, 0 0 20px #FF1493; }
}

/* =================== Login Screen =================== */
#login-screen {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  background: rgba(0,0,0,0.4);
}

#login-screen h1 {
  font-size: 3em;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #39FF14, #00FFFF, #FF1493, #8A2BE2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: neonGlow 3s infinite;
}

#login-screen input {
  padding: 12px;
  margin: 10px;
  width: 250px;
  border-radius: 10px;
  border: 2px solid #39FF14;
  outline: none;
  background: #111;
  color: #fff;
  font-size: 1em;
  text-align: center;
  transition: 0.3s;
}

#login-screen input:focus {
  border-color: #00FFFF;
  box-shadow: 0 0 10px #00FFFF, 0 0 20px #FF1493;
}

#login-screen button {
  padding: 12px 20px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #39FF14;
  color: #000;
  font-weight: bold;
  font-size: 1em;
  transition: all 0.3s;
  box-shadow: 0 0 10px #39FF14, 0 0 20px #FF1493;
  animation: pulse 2s infinite;
}

#login-screen button:hover {
  background: #00FFFF;
  box-shadow: 0 0 15px #00FFFF, 0 0 30px #FF1493;
}

/* =================== Store =================== */
#store {
  display: none;
}

header {
  padding: 30px;
  text-align: center;
  font-size: 3em;
  font-weight: bold;
  letter-spacing: 3px;
  animation: neonGlow 2s ease-in-out infinite alternate;
  position: relative;
}

header span.shop {
  color: #FF1493;
  text-shadow: 0 0 15px #FF1493, 0 0 30px #00FFFF;
}

.user-settings {
  position: absolute;
  top: 10px;
  right: 20px;
  background: linear-gradient(135deg, #00FFFF, #FF1493, #39FF14);
  padding: 10px 20px;
  border-radius: 15px;
  color: #000;
  font-weight: bold;
  text-shadow: 0 0 5px #000;
  animation: pulse 2s infinite alternate;
  cursor: pointer;
  box-shadow: 0 0 10px #39FF14, 0 0 20px #FF1493;
}

.search-container {
  display: flex;
  justify-content: center;
  padding: 20px;
}

.search-container input {
  width: 50%;
  padding: 12px;
  font-size: 1em;
  border: 2px solid #39FF14;
  border-radius: 5px 0 0 5px;
  outline: none;
  background: #111;
  color: #fff;
  transition: border 0.3s, box-shadow 0.3s;
}

.search-container input:focus {
  border-color: #00FFFF;
  box-shadow: 0 0 10px #00FFFF, 0 0 20px #FF1493;
}

.search-container button {
  padding: 12px 20px;
  font-size: 1em;
  border: 2px solid #39FF14;
  background: #39FF14;
  color: #000;
  border-radius: 0 5px 5px 0;
  font-weight: bold;
  transition: all 0.3s;
}

.search-container button:hover {
  background: #00FFFF;
  border-color: #00FFFF;
  box-shadow: 0 0 15px #00FFFF, 0 0 30px #FF1493;
}

/* Game Cards */
.game-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 20px;
}

.game-card {
  background-color: #111;
  border: 2px solid #39FF14;
  border-radius: 20px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.5s, border-color 0.5s;
  position: relative;
}

.game-card:hover {
  transform: translateY(-12px) rotate(-1deg);
  border-color: #FF1493;
  box-shadow: 0 0 25px #39FF14, 0 0 45px #00FFFF;
}

.game-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: transform 0.5s;
}

.game-card:hover img {
  transform: scale(1.05);
}

.game-card h3 {
  margin: 10px;
  font-size: 1.2em;
  color: #fff;
  text-align: center;
  text-shadow: 0 0 5px #39FF14;
}

.game-card button {
  margin: 10px;
  padding: 12px;
  width: calc(100% - 20px);
  background: #39FF14;
  border: none;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  border-radius: 10px;
  font-size: 1em;
  transition: all 0.3s;
}

.game-card button:hover {
  background: #00FFFF;
  box-shadow: 0 0 15px #00FFFF, 0 0 30px #FF1493;
}

/* =================== Payment Page =================== */
#payment-page {
  display: none;
  padding: 20px;
  text-align: center;
}

.payment-option {
  display: inline-block;
  margin: 15px;
  padding: 20px;
  background: linear-gradient(135deg, #00FFFF, #FF1493, #39FF14);
  border-radius: 15px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 0 10px #39FF14, 0 0 20px #FF1493;
  transition: all 0.3s;
}

.payment-option:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00FFFF, 0 0 40px #FF1493;
}

/* Dark / Light Mode Toggle */
#mode-toggle {
  position: fixed;
  top: 10px;
  left: 10px;
  padding: 10px 15px;
  background: linear-gradient(135deg,#FF1493,#39FF14,#00FFFF);
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  color: #000;
  box-shadow: 0 0 10px #39FF14, 0 0 20px #FF1493;
}
</style>
</head>
<body class="light-mode">

<!-- Dark/Light Toggle -->
<div id="mode-toggle" onclick="toggleMode()">Toggle Dark/Light Mode</div>

<!-- Login Screen -->
<div id="login-screen">
  <h1>Game <span class="shop">Shop</span></h1>
  <input type="text" id="username" placeholder="اسم المستخدم / Username">
  <input type="password" id="password" placeholder="كلمة المرور / Password">
  <button onclick="login()">Enter Store</button>
</div>

<!-- Store -->
<div id="store">
  <header>Game <span class="shop">Shop</span></header>
  <div class="user-settings" id="user-name"></div>

  <div class="search-container">
    <input type="text" id="search" placeholder="Search for a game...">
    <button onclick="searchGames()">Search</button>
  </div>

  <div class="game-list" id="game-list"></div>
</div>

<!-- Payment Page -->
<div id="payment-page">
  <h2>صفحة الدفع / Payment</h2>
  <div class="payment-option" onclick="alert('Paid with Credit Card!')">Visa / Credit Card</div>
  <div class="payment-option" onclick="alert('Paid with E-Wallet!')">محفظة إلكترونية / E-Wallet</div>
  <div class="payment-option" onclick="alert('Paid with InstaPay!')">إنستا باي / InstaPay</div>
</div>

<script>
const games = [
  { name: "Cyberpunk 2077", img: "images/cyberpunk2077.jpg" },
  { name: "Minecraft", img: "images/minecraft.jpg" },
  { name: "FIFA 23", img: "images/fifa23.jpg" },
  { name: "The Witcher 3", img: "images/witcher3.jpg" },
  { name: "Among Us", img: "images/amongus.jpg" }
];

const gameListEl = document.getElementById("game-list");

function displayGames(gamesToDisplay){
  gameListEl.innerHTML = "";
  gamesToDisplay.forEach(game=>{
    const card=document.createElement("div");
    card.className="game-card";
    card.innerHTML=`
      <img src="${game.img}" alt="${game.name}">
      <h3>${game.name}</h3>
      <button onclick="goToPayment('${game.name}')">Buy Now</button>
    `;
    gameListEl.appendChild(card);
  });
}

function login(){
  const usernameInput = document.getElementById("username").value || "Heba Elnouby / هبه النوبي";
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("store").style.display = "block";
  document.getElementById("user-name").textContent = usernameInput;
  displayGames(games);
}

function searchGames(){
  const query=document.getElementById("search").value.toLowerCase();
  const filtered=games.filter(game=>game.name.toLowerCase().includes(query));
  displayGames(filtered);
}

function goToPayment(gameName){
  document.getElementById("store").style.display = "none";
  document.getElementById("payment-page").style.display = "block";
  document.getElementById("payment-page").scrollIntoView();
}

function toggleMode(){
  document.body.classList.toggle("dark-mode");
  document.body.classList.toggle("light-mode");
}
</script>
</body>
</html>
